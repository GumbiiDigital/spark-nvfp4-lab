name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck pipeline scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run shellcheck
        run: shellcheck -s bash -S warning scripts/*.sh tests/*.sh

  render-card-test:
    name: render_card.py functional test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Run render_card fixture test
        run: bash tests/test_render_card.sh
